name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  NODE_VERSION: "24"

jobs:
  lint-and-typecheck:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Run Vitest
        run: pnpm test

  e2e-gate:
    name: E2E gate
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      run_e2e: ${{ steps.check.outputs.run_e2e }}
    steps:
      - name: Check required secrets
        id: check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        run: |
          if [ -n "$DATABASE_URL" ] && [ -n "$NEXT_PUBLIC_SUPABASE_URL" ] && [ -n "$ADMIN_EMAIL" ]; then
            echo "run_e2e=true" >> "$GITHUB_OUTPUT"
            echo "E2E secrets detected — will run smoke tests."
          else
            echo "run_e2e=false" >> "$GITHUB_OUTPUT"
            echo "::warning::E2E skipped — configure DATABASE_URL, NEXT_PUBLIC_SUPABASE_URL, ADMIN_EMAIL, and related repository secrets to run smoke tests."
          fi

  e2e:
    name: E2E smoke (Playwright)
    runs-on: ubuntu-latest
    # PRs from forks won't have access to secrets; only run on push to main.
    # Requires repository secrets:
    #   DATABASE_URL, NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY,
    #   SUPABASE_SERVICE_ROLE_KEY, TEST_USER_EMAIL, TEST_USER_PASSWORD,
    #   ADMIN_EMAIL, ADMIN_PASSWORD.
    needs: [lint-and-typecheck, test, e2e-gate]
    if: needs.e2e-gate.outputs.run_e2e == 'true'
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      SEED_ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      SEED_ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      SEED_TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      SEED_TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build

      - name: Seed database
        run: pnpm exec tsx prisma/seed.ts

      - name: Start Next.js
        run: pnpm start &

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 120000

      - name: Run Playwright smoke tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
